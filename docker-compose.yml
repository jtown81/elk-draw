version: '3.8'

services:
  elk-analyzer:
    image: ghcr.io/jtown81/elk-draw:latest
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - ghcr.io/jtown81/elk-draw:latest
    container_name: elk-draw-analyzer
    ports:
      - "3456:3456"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3456/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - hunting-network

networks:
  hunting-network:
    driver: bridge
