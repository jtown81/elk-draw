<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>South Dakota Elk Draw Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .stat-card h3 {
            color: #667eea;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .button-group.full {
            grid-template-columns: 1fr;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f093fb;
            color: white;
        }

        .btn-secondary:hover {
            background: #e080e8;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #ee5a52;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #51cf66;
            color: white;
        }

        .btn-success:hover {
            background: #37b24d;
            transform: translateY(-2px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table thead {
            background: #f5f5f5;
            border-bottom: 2px solid #667eea;
        }

        table th {
            padding: 12px;
            text-align: left;
            color: #667eea;
            font-weight: 600;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        table tr:hover {
            background: #f9f9f9;
        }

        .odds-excellent {
            color: #51cf66;
            font-weight: bold;
        }

        .odds-good {
            color: #ffd43b;
            font-weight: bold;
        }

        .odds-poor {
            color: #ff6b6b;
            font-weight: bold;
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .message.success {
            background: #d3f9d8;
            color: #2b8a3e;
            border-left: 4px solid #51cf66;
        }

        .message.info {
            background: #d0ebff;
            color: #0c36a1;
            border-left: 4px solid #667eea;
        }

        .message.warning {
            background: #fff3bf;
            color: #7d6608;
            border-left: 4px solid #ffd43b;
        }

        .message.error {
            background: #ffe0e0;
            color: #7a0f0f;
            border-left: 4px solid #ff6b6b;
        }

        .recommendations {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .recommendation-item {
            padding: 15px;
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            border-radius: 5px;
        }

        .recommendation-item .rank {
            display: inline-block;
            background: #667eea;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            text-align: center;
            line-height: 30px;
            margin-right: 10px;
            font-weight: bold;
        }

        .recommendation-item .unit-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-right: 15px;
        }

        .recommendation-item .odds-display {
            font-size: 1.1em;
            color: #667eea;
            font-weight: bold;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .empty-state p {
            font-size: 1.1em;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 0.9em;
            }

            table th,
            table td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🦌 South Dakota Elk Draw Analyzer</h1>
            <p>Analyze your odds with 11 preference points</p>
        </header>

        <div class="stats">
            <div class="stat-card">
                <h3>Preference Points</h3>
                <div class="value">11</div>
            </div>
            <div class="stat-card">
                <h3>Lottery Entries</h3>
                <div class="value">1,728</div>
            </div>
            <div class="stat-card">
                <h3>Draw Pool</h3>
                <div class="value">10+</div>
            </div>
            <div class="stat-card">
                <h3>Units Added</h3>
                <div class="value" id="unitCount">0</div>
            </div>
        </div>

        <div class="main-content">
            <div class="card">
                <h2>Add Unit Data</h2>
                <div id="addMessage"></div>
                <div class="form-group">
                    <label for="unitName">Unit Name (e.g., H1A)</label>
                    <input type="text" id="unitName" placeholder="H1A" style="text-transform: uppercase;">
                </div>
                <div class="form-group">
                    <label for="year">Year</label>
                    <input type="number" id="year" value="2026">
                </div>
                <div class="form-group">
                    <label for="tags">Number of Tags</label>
                    <input type="number" id="tags" min="1">
                </div>
                <div class="form-group">
                    <label for="apps10Plus">Applicants in 10+ Pool</label>
                    <input type="number" id="apps10Plus" min="1">
                </div>
                <div class="form-group">
                    <label for="lowestPoint">Lowest Point Drawn</label>
                    <input type="number" id="lowestPoint" min="0">
                </div>
                <div class="button-group full">
                    <button class="btn-primary" onclick="addUnit()">Add Unit</button>
                </div>
            </div>

            <div class="card">
                <h2>Tools</h2>
                <div class="button-group">
                    <button class="btn-success" onclick="exportData()">Export Data</button>
                    <button class="btn-secondary" onclick="importData()">Import Data</button>
                </div>
                <div class="button-group">
                    <button class="btn-danger" onclick="clearAllData()">Clear All</button>
                </div>
                <input type="file" id="importFile" style="display: none;" accept=".json" onchange="handleImport(event)">
            </div>
        </div>

        <div class="card full-width">
            <h2>Your Data & Analysis</h2>
            <div id="analysisMessage"></div>
            <div id="resultsContainer"></div>
        </div>
    </div>

    <script>
        const PREFERENCE_POINTS = 11;
        const CUBED_ENTRIES = Math.pow(PREFERENCE_POINTS + 1, 3); // 1728

        /**
         * Escape HTML to prevent XSS
         */
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        /**
         * Load data from localStorage
         */
        function loadData() {
            const data = localStorage.getItem('elkDrawData');
            return data ? JSON.parse(data) : [];
        }

        /**
         * Save data to localStorage
         */
        function saveData(data) {
            localStorage.setItem('elkDrawData', JSON.stringify(data));
            updateUI();
        }

        /**
         * Calculate odds
         */
        function calculateOdds(cubedEntries, totalApplicants) {
            if (totalApplicants === 0) return 0;
            return ((cubedEntries / totalApplicants) * 100).toFixed(2);
        }

        /**
         * Add unit
         */
        function addUnit() {
            const unitName = document.getElementById('unitName').value.toUpperCase();
            const year = parseInt(document.getElementById('year').value);
            const tags = parseInt(document.getElementById('tags').value);
            const apps10Plus = parseInt(document.getElementById('apps10Plus').value);
            const lowestPoint = parseInt(document.getElementById('lowestPoint').value);

            if (!unitName || !year || !tags || !apps10Plus) {
                showMessage('addMessage', 'Please fill in all fields', 'error');
                return;
            }

            const odds = calculateOdds(CUBED_ENTRIES, apps10Plus);

            const entry = {
                id: Date.now(),
                unitName,
                year,
                tags,
                apps10Plus,
                lowestPoint,
                odds: parseFloat(odds),
                addedDate: new Date().toISOString(),
            };

            const data = loadData();
            data.push(entry);
            saveData(data);

            // Clear form
            document.getElementById('unitName').value = '';
            document.getElementById('tags').value = '';
            document.getElementById('apps10Plus').value = '';
            document.getElementById('lowestPoint').value = '';

            showMessage('addMessage', `✓ ${escapeHtml(unitName)} added successfully`, 'success');
        }

        /**
         * Show message (safely)
         */
        function showMessage(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.textContent = '';
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = message;
            element.appendChild(div);

            if (type === 'success') {
                setTimeout(() => {
                    element.textContent = '';
                }, 3000);
            }
        }

        /**
         * Update UI
         */
        function updateUI() {
            const data = loadData();
            document.getElementById('unitCount').textContent = data.length;

            const container = document.getElementById('resultsContainer');
            container.textContent = '';

            if (data.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'empty-state';
                const p = document.createElement('p');
                p.textContent = 'No units added yet. Start by adding your first elk unit data!';
                emptyDiv.appendChild(p);
                container.appendChild(emptyDiv);
                return;
            }

            // Sort by odds (highest first)
            const sorted = [...data].sort((a, b) => b.odds - a.odds);

            // Create table
            const table = document.createElement('table');
            const thead = table.createTHead();
            const headerRow = thead.insertRow();
            ['Unit', 'Year', 'Tags', 'Apps (10+)', 'Your Odds', 'Action'].forEach(text => {
                const th = document.createElement('th');
                th.textContent = text;
                headerRow.appendChild(th);
            });

            const tbody = table.createTBody();
            sorted.forEach((unit) => {
                const row = tbody.insertRow();

                let oddsClass = 'odds-poor';
                if (unit.odds > 5) oddsClass = 'odds-excellent';
                else if (unit.odds > 2) oddsClass = 'odds-good';

                // Unit name
                const unitCell = row.insertCell();
                const unitStrong = document.createElement('strong');
                unitStrong.textContent = escapeHtml(unit.unitName);
                unitCell.appendChild(unitStrong);

                // Year
                row.insertCell().textContent = unit.year;

                // Tags
                row.insertCell().textContent = unit.tags;

                // Apps
                row.insertCell().textContent = unit.apps10Plus;

                // Odds
                const oddsCell = row.insertCell();
                oddsCell.className = oddsClass;
                oddsCell.textContent = unit.odds + '%';

                // Delete button
                const actionCell = row.insertCell();
                const btn = document.createElement('button');
                btn.className = 'btn-danger';
                btn.textContent = 'Delete';
                btn.onclick = () => deleteUnit(unit.id);
                actionCell.appendChild(btn);
            });

            container.appendChild(table);

            // Add recommendations
            const top5 = sorted.slice(0, 5);
            const h3 = document.createElement('h3');
            h3.style.marginTop = '30px';
            h3.style.color = '#667eea';
            h3.textContent = 'Top 5 Recommendations';
            container.appendChild(h3);

            const recsDiv = document.createElement('div');
            recsDiv.className = 'recommendations';

            top5.forEach((unit, index) => {
                const item = document.createElement('div');
                item.className = 'recommendation-item';

                const rank = document.createElement('span');
                rank.className = 'rank';
                rank.textContent = index + 1;
                item.appendChild(rank);

                const unitName = document.createElement('span');
                unitName.className = 'unit-name';
                unitName.textContent = escapeHtml(unit.unitName);
                item.appendChild(unitName);

                const odds = document.createElement('span');
                odds.className = 'odds-display';
                odds.textContent = unit.odds + '%';
                item.appendChild(odds);

                const details = document.createElement('div');
                details.style.marginTop = '10px';
                details.style.color = '#666';
                details.style.fontSize = '0.9em';
                details.textContent = `${unit.tags} tags • ${unit.apps10Plus} applicants • Lowest: ${unit.lowestPoint}`;
                item.appendChild(details);

                recsDiv.appendChild(item);
            });

            container.appendChild(recsDiv);
        }

        /**
         * Delete unit
         */
        function deleteUnit(id) {
            if (confirm('Delete this unit?')) {
                const data = loadData();
                const index = data.findIndex(u => u.id === id);
                if (index > -1) {
                    const removed = data.splice(index, 1);
                    saveData(data);
                    showMessage('analysisMessage', `✓ Deleted ${escapeHtml(removed[0].unitName)}`, 'success');
                }
            }
        }

        /**
         * Export data
         */
        function exportData() {
            const data = loadData();
            if (data.length === 0) {
                showMessage('analysisMessage', 'No data to export', 'warning');
                return;
            }

            const dataStr = JSON.stringify(data, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `elk-draw-export-${new Date().toISOString().split('T')[0]}.json`;
            link.click();

            showMessage('analysisMessage', `✓ Data exported (${data.length} units)`, 'success');
        }

        /**
         * Import data
         */
        function importData() {
            document.getElementById('importFile').click();
        }

        /**
         * Handle import
         */
        function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!Array.isArray(data)) {
                        throw new Error('Invalid data format');
                    }
                    saveData(data);
                    showMessage('analysisMessage', `✓ Imported ${data.length} units`, 'success');
                } catch (error) {
                    showMessage('analysisMessage', `Error: ${error.message}`, 'error');
                }
            };
            reader.readAsText(file);
        }

        /**
         * Clear all data
         */
        function clearAllData() {
            if (confirm('Delete all data? This cannot be undone.')) {
                if (confirm('Are you sure? This will permanently delete all units.')) {
                    saveData([]);
                    showMessage('analysisMessage', '✓ All data cleared', 'success');
                }
            }
        }

        // Initialize
        updateUI();
    </script>
</body>
</html>
